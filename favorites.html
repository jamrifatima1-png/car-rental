<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Favorites</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        h1 { text-align: center; margin-bottom: 30px; }

        .favorites-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .car-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .car-card:hover { transform: translateY(-5px); border-color: #38bdf8; }

        .car-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 10px;
        }

        .car-card h3 { margin: 15px 0 5px; }
        .car-card p { color: #38bdf8; font-weight: bold; margin-bottom: 15px; }

        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        .car-card button {
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .view-btn { background: #1e293b; color: white; }
        .rent-btn { background: #38bdf8; color: white; }
        .remove-btn { background: #ef4444; color: white; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: rgba(30, 41, 59, 0.95);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        .form-btns { display: flex; gap: 10px; margin-top: 15px; }
        .confirm-btn { background: #38bdf8; color: white; flex: 2; padding: 12px; border-radius: 8px; border: none; cursor: pointer; }
        .cancel-btn { background: #475569; color: white; flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h1>My Favorite Cars</h1>
    <div class="favorites-container" id="favoritesContainer"></div>

    <div id="bookingModal" class="modal-overlay">
        <div class="modal-content">
            <h2>Rent: <span id="dynamicCarName" style="color:#38bdf8"></span></h2>
            <form id="reservationForm">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>
                <input type="tel" placeholder="Phone Number" required>
                <input type="date" required title="Pickup Date">
                <div class="form-btns">
                    <button type="submit" class="confirm-btn">Confirm Rent</button>
                    <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
        const container = document.getElementById("favoritesContainer");

        function displayFavorites() {
            container.innerHTML = "";
            if (favorites.length === 0) {
                container.innerHTML = "<p style='text-align:center; width:100%'>No favorites added yet.</p>";
                return;
            }

            favorites.forEach(car => { // afficher cars favourite
                const div = document.createElement("div");
                div.className = "car-card";
                div.innerHTML = `
                    <img src="${car.img}" alt="${car.name}">
                    <h3>${car.name}</h3>
                    <p>${car.price} MAD / day</p>
                    <div class="btn-group">
                        <button class="rent-btn" onclick="openModal('${car.name}')">Rent Now</button>
                        <button class="view-btn" onclick="goToDetails('${car.name}')">Details</button>
                        <button class="remove-btn" onclick="removeFavorite('${car.name}')">Remove</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function openModal(name) {
            document.getElementById('dynamicCarName').innerText = name;
            document.getElementById('bookingModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('bookingModal').style.display = 'none';
        }

        function goToDetails(name) { 
            const car = favorites.find(c => c.name === name);
            const params = new URLSearchParams(car); // caracters of this car
            window.location.href = `details.html?${params.toString()}`;
        }

        function removeFavorite(name) { 
            favorites = favorites.filter(c => c.name !== name);
            localStorage.setItem("favorites", JSON.stringify(favorites));
            displayFavorites();
        }

        document.getElementById('reservationForm').onsubmit = function(e) {
            e.preventDefault();
            const carName = document.getElementById('dynamicCarName').innerText;
            alert(`Your request for ${carName} has been sent!`);
            closeModal();
        };

        window.onclick = function(e) { // close the modal if i click outside
            if (e.target.id === 'bookingModal') closeModal();
        };

        displayFavorites();
    </script>
</body>
</html>
